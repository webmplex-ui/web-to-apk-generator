name: Build and Release APK
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
      package_name:
        description: 'Package Name'
      site_url:
        description: 'Site URL'
      v_name:
        description: 'Version Name'
      v_code:
        description: 'Version Code'
      admob_id:
        description: 'AdMob App ID'
      banner_id:
        description: 'AdMob Banner ID'
      interstitial_id:
        description: 'AdMob Interstitial ID'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # এটি রিলিজ তৈরির জন্য বাধ্যতামূলক
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Inject Configuration
        run: |
          echo "Injecting values..."
          echo "app_name=${{ github.event.inputs.app_name }}" >> local.properties
          echo "site_url=${{ github.event.inputs.site_url }}" >> local.properties
          echo "v_name=${{ github.event.inputs.v_name }}" >> local.properties
          echo "v_code=${{ github.event.inputs.v_code }}" >> local.properties
          echo "admob_id=${{ github.event.inputs.admob_id }}" >> local.properties
          echo "banner_id=${{ github.event.inputs.banner_id }}" >> local.properties
          echo "interstitial_id=${{ github.event.inputs.interstitial_id }}" >> local.properties

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # এই স্টেপটি চেক করবে APK ফাইলটি আসলেই তৈরি হয়েছে কি না
      - name: Verify APK Path
        run: ls -R app/build/outputs/apk/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: "v${{ github.run_number }}-${{ github.event.inputs.v_name }}"
          name: "Build #${{ github.run_number }} - v${{ github.event.inputs.v_name }}"
          body: |
            🎉 **APK Generated Successfully!**
            📱 **App Name:** ${{ github.event.inputs.app_name }}
            📦 **Version:** ${{ github.event.inputs.v_name }} (Code: ${{ github.event.inputs.v_code }})
          files: |
             app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
